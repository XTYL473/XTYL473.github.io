<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        :root {
            --bg: #ffffff;
            --text: #222;
            --card: #f8f9fa;
            --border: #eee;
            --accent: #0070f3;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --text: #eaeaea;
                --card: #1e1e1e;
                --border: #333;
                --accent: #58a6ff;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .blog-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .post-card {
            background: var(--card);
            padding: 1.25rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .post-card:hover {
            transform: translateY(-2px);
        }

        .post-date {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .post-excerpt {
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="./index.html" class="blog-title">我的个人博客</a>
    </header>

    <div class="post-list">
        <a href="./post1.html" class="post-card">
            <div class="post-date">2026-04-27</div>
            <div class="post-title">GitHub Pages 搭建博客指南</div>
            <div class="post-excerpt">免费搭建个人静态博客，无需服务器，小白一键上手。</div>
        </a>

        <a href="./post2.html" class="post-card">
            <div class="post-date">2026-04-27</div>
            <div class="post-title">静态多页面博客结构讲解</div>
            <div class="post-excerpt">独立HTML页面跳转，结构清晰，方便长期维护。</div>
        </a>
    </div>
</body>
</html>
